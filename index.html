<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>水素原子AR（GLB最終確定版）</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

<style>
body{margin:0;}
#startBtn{
position:fixed;
top:20px;
left:20px;
z-index:999;
padding:10px 20px;
background:#06c755;
color:white;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<button id="startBtn">AR開始</button>

<a-scene
mindar-image="imageTargetSrc: targets.mind;"
renderer="colorManagement: true"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false">

<!-- ===== assets（最初に置く） ===== -->
<a-assets timeout="10000">
  <a-asset-item id="proton" src="models/proton.glb"></a-asset-item>
  <a-asset-item id="electron" src="models/electron.glb"></a-asset-item>
  <a-asset-item id="cloud" src="models/electron_cloud.glb"></a-asset-item>
</a-assets>

<a-camera position="0 0 0"></a-camera>

<a-light type="directional" position="1 2 1" intensity="1"></a-light>
<a-light type="ambient" intensity="0.5"></a-light>

<a-entity mindar-image-target="targetIndex: 0">

  <a-entity scale="0.6 0.6 0.6">

    <!-- ===== 原子核（GLB） ===== -->
    <a-entity>

      <a-entity 
        gltf-model="#proton"
        scale="0.003 0.003 0.003"
        position="0 0 0">
      </a-entity>

      <!-- ＋ -->
      <a-entity position="0 0 0.06">
        <a-box width="0.05" height="0.015" depth="0.015" color="black"></a-box>
        <a-box width="0.015" height="0.05" depth="0.015" color="black"></a-box>
      </a-entity>

    </a-entity>

    <!-- ===== 電子雲（GLB） ===== -->
    <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 50000">

      <a-entity 
        gltf-model="#cloud"
        scale="0.01 0.01 0.01"
        position="0 0 0">
      </a-entity>

    </a-entity>

    <!-- ===== 電子 ===== -->
    <a-entity id="e">

      <a-entity 
        gltf-model="#electron"
        scale="0.003 0.003 0.003"
        position="0 0 0">
      </a-entity>

      <!-- − -->
      <a-box position="0 0 0.04"
             width="0.03" height="0.01" depth="0.015"
             color="black">
      </a-box>

    </a-entity>

  </a-entity>

</a-entity>

</a-scene>

<script>

// AR開始
document.getElementById("startBtn").onclick = () => {
  document.querySelector("a-scene")
    .components["mindar-image-system"].start();
};

// 電子の動き
const baseR = 0.5;
let angle = Math.random()*Math.PI*2;

setInterval(()=>{

  const r = baseR * (0.6 + 0.2*Math.sin(Date.now()*0.002));

  angle += 0.035;

  let x = r * Math.cos(angle);
  let z = r * Math.sin(angle);
  let y = 0.2*Math.sin(angle*2);

  document.getElementById("e")
    .setAttribute("position",{x,y,z});

},30);

</script>

</body>
</html>
