<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>水素原子AR（GLB完成版）</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

<style>
body{margin:0;}
#startBtn{
position:fixed;
top:20px;
left:20px;
z-index:999;
padding:10px 20px;
background:#06c755;
color:white;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<button id="startBtn">AR開始</button>

<a-scene
mindar-image="imageTargetSrc: targets.mind;"
renderer="colorManagement: true"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false">

<!-- ===== GLB読み込み（最重要） ===== -->
<a-assets>
  <a-asset-item id="nucleusModel" src="./models/nucleus.glb"></a-asset-item>
  <a-asset-item id="electronModel" src="./models/electron.glb"></a-asset-item>
</a-assets>

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<!-- ライト -->
<a-light type="directional" position="1 2 1" intensity="1"></a-light>
<a-light type="ambient" intensity="0.4"></a-light>

<!-- マーカー -->
<a-entity mindar-image-target="targetIndex: 0">

  <a-entity id="atom" scale="0.6 0.6 0.6">

    <!-- ===== 原子核 ===== -->
    <a-entity position="0 0 0">

      <a-entity 
        gltf-model="#nucleusModel"
        scale="0.01 0.01 0.01">
      </a-entity>

      <!-- ＋ -->
      <a-entity position="0 0 0.06">
        <a-box width="0.06" height="0.015" depth="0.015" color="black"></a-box>
        <a-box width="0.015" height="0.06" depth="0.015" color="black"></a-box>
      </a-entity>

    </a-entity>

    <!-- ===== 電子雲 ===== -->
    <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 40000">

      <a-sphere radius="0.52"
                color="#66ccff"
                material="transparent:true; opacity:0.35; emissive:#3399ff; emissiveIntensity:0.6">
      </a-sphere>

      <a-sphere radius="0.5"
                color="#66ccff"
                material="transparent:true; opacity:0.15">
      </a-sphere>

      <a-sphere radius="0.4"
                color="#3399ff"
                material="transparent:true; opacity:0.35">
      </a-sphere>

      <a-sphere radius="0.3"
                color="#0066ff"
                material="transparent:true; opacity:0.6">
      </a-sphere>

      <a-sphere radius="0.2"
                color="#0033cc"
                material="transparent:true; opacity:0.85">
      </a-sphere>

    </a-entity>

    <!-- ===== 電子 ===== -->
    <a-entity id="electron">

      <a-entity 
        gltf-model="#electronModel"
        scale="0.01 0.01 0.01">
      </a-entity>

      <!-- − -->
      <a-box position="0 0 0.04"
             width="0.035" height="0.01" depth="0.015"
             color="black">
      </a-box>

    </a-entity>

  </a-entity>

</a-entity>

</a-scene>

<script>

// AR開始
document.getElementById("startBtn").onclick = () => {
  document.querySelector("a-scene")
    .components["mindar-image-system"].start();
};

// 電子の動き
const baseR = 0.5;
let angle = Math.random()*Math.PI*2;
const tilt = 0.6;

setInterval(()=>{

  const r = baseR * (0.6 + 0.2*Math.sin(Date.now()*0.002));

  angle += 0.035;

  let x = r * Math.cos(angle);
  let z = r * Math.sin(angle) * Math.cos(tilt);
  let y = r * Math.sin(angle) * Math.sin(tilt);

  // 微小ゆらぎ
  x += (Math.random()-0.5)*0.01;
  y += (Math.random()-0.5)*0.01;
  z += (Math.random()-0.5)*0.01;

  document.getElementById("electron")
    .setAttribute("position",{x,y,z});

},30);

</script>

</body>
</html>
